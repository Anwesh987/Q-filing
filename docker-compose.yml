services:
  q-filing-api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      FRONTEND_ORIGIN: "http://localhost:5173"
      USE_EXISTING_PIPELINE: "false"
      USE_QUANTUM_CORE: "false"

  q-filing-frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - q-filing-api
